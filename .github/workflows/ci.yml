name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - run: git clone --depth 1 https://github.com/kotoba-lang/kotoba-protocol ../kotoba-protocol
      - run: clojure -M:test
      - run: clojure -M:lint
      - name: Compile bounded boundary profile
        run: |
          mkdir -p target/kotoba
          clojure -M:kotoba compile src/atprotocol/bounded_boundary.kotoba \
            --source-path src --target js-browser --output target/kotoba/atproto.mjs
          clojure -M:kotoba compile src/atprotocol/bounded_boundary.kotoba \
            --source-path src --target wasm32-browser --output target/kotoba/atproto.wasm
      - name: Execute Web and typed Wasm conformance
        run: |
          compiler_src="$(clojure -Spath -M:kotoba | tr ':' '\n' | grep '/compiler/' | head -1)"
          node scripts/verify-kotoba.mjs target/kotoba/atproto.mjs \
            target/kotoba/atproto.wasm "$(dirname "$compiler_src")/runtime/browser-host.mjs"
